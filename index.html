<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Lorenzo & Thalia</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --azul-antiguo: #1c2a3d; 
      --fuente-nombres: 'Playfair Display', serif;
      --dorado: #b59a6d;
      --crema: #f4ece0;
      --celeste: #d1e3f0;
    }

    html { scroll-behavior: smooth; }
    body {
      margin: 0; padding: 0;
      background-color: #e2d1b9;
      background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
      font-family: 'Montserrat', sans-serif;
      color: var(--azul-antiguo);
      overflow-x: hidden;
    }

    /* --- SOBRE INICIAL --- */
    .hero-section {
      height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }

    .envelope-wrapper {
      position: relative;
      width: 320px; height: 220px;
      cursor: pointer;
      perspective: 1000px;
    }

    .envelope {
      position: absolute; width: 100%; height: 100%;
      background-color: var(--azul-antiguo);
      border-radius: 4px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      z-index: 4;
    }

    .envelope-top {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #24354a;
      clip-path: polygon(0 0, 100% 0, 50% 55%);
      z-index: 6;
      transition: transform 0.8s ease;
      transform-origin: top;
    }

    .tag-card {
      position: absolute; bottom: 5px; left: 5%;
      width: 90%; height: 200px;
      background-color: var(--crema);
      border-radius: 3px;
      z-index: 2;
      transition: all 0.8s ease;
      padding: 20px 10px;
      text-align: center;
      box-sizing: border-box;
    }

    .envelope-wrapper.open .envelope-top { transform: rotateX(180deg); z-index: 1; }
    .envelope-wrapper.open .tag-card { transform: translateY(-160px); z-index: 8; height: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

    /* --- CONTENIDO PRINCIPAL --- */
    .content-section { display: none; padding: 40px 15px; max-width: 600px; margin: 0 auto; text-align: center; }
    
    .arch-card-large { 
      background: white; 
      border-radius: 150px 150px 20px 20px; 
      padding: 60px 20px 40px; 
      border: 1px solid #dcd0ba; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      margin-bottom: 40px;
    }

    /* --- CONTADOR OPTIMIZADO --- */
    .countdown-container {
      display: flex; 
      justify-content: center; 
      gap: 10px;
      margin-top: 30px; 
      padding-top: 20px; 
      border-top: 1px solid #f0f0f0;
    }
    .countdown-item { display: flex; flex-direction: column; align-items: center; width: 60px; }
    .countdown-number { 
      font-family: var(--fuente-nombres); 
      font-size: 1.6rem; 
      color: var(--azul-antiguo); 
      font-weight: bold;
    }
    .countdown-label { font-size: 0.55rem; text-transform: uppercase; color: var(--dorado); font-weight: 600; }

    /* --- CARRUSEL --- */
    .carousel-container { 
      position: relative; overflow: hidden; 
      border-radius: 120px 120px 20px 20px; 
      border: 5px solid white; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
      margin: 30px 0;
    }
    .carousel-slide { display: flex; transition: transform 0.6s ease; }
    .carousel-slide img { width: 100%; aspect-ratio: 4/5; object-fit: cover; flex-shrink: 0; }
    
    .btn-wa { 
      background: var(--azul-antiguo); color: white; padding: 14px 20px; 
      border-radius: 4px; border: none; font-weight: 600; cursor: pointer; 
      width: 100%; max-width: 280px; text-decoration: none; display: inline-block;
    }

    .timeline-item { display: flex; align-items: center; margin-bottom: 30px; position: relative; }
    .timeline-dot { width: 12px; height: 12px; background: var(--azul-antiguo); border-radius: 50%; z-index: 2; margin: 0 15px; border: 2px solid white; box-shadow: 0 0 0 2px var(--dorado); }
  </style>
</head>
<body>

  <div class="hero-section">
    <div class="envelope-wrapper" id="envelope" onclick="this.classList.toggle('open')">
      <div class="envelope">
        <div class="envelope-top"></div>
        <div style="position: absolute; top:50%; left:50%; transform:translate(-50%,-20%); width:60px; height:60px; background:radial-gradient(circle, #d4af37, #b59a6d); border-radius:50%; z-index:10; display:flex; justify-content:center; align-items:center; color:white; font-family:serif;">L&T</div>
      </div>
      <div class="tag-card">
        <h2 style="font-family: var(--fuente-nombres); margin: 0;">Lorenzo & Thalia</h2>
        <p style="font-size: 0.6rem; letter-spacing: 2px; color: var(--dorado); margin: 5px 0;">INVITACIÓN EXCLUSIVA</p>
        <div style="margin: 15px 0; height: 1px; background: rgba(0,0,0,0.1);"></div>
        <p style="font-weight: 600; margin: 0;">FAM. LLAMAS LÓPEZ</p>
        <p style="font-size: 0.75rem; color: #666;">5 Pases confirmados</p>
        <button class="btn-wa" style="margin-top: 15px; padding: 8px;" id="btnDetalles">ABRIR DETALLES</button>
      </div>
    </div>
    <p style="margin-top: 25px; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.7;">TOCA EL SOBRE PARA EMPEZAR</p>
  </div>

  <div id="secciones" class="content-section">
    <div class="arch-card-large">
      <p style="letter-spacing: 4px; font-size: 0.7rem; color: var(--dorado);">SAVE THE DATE</p>
      <h1 style="font-family: var(--fuente-nombres); font-size: 2.2rem; margin: 10px 0;">Lorenzo & Thalia</h1>
      <p style="font-style: italic; color: #777; font-size: 0.9rem;">"Donde tú vayas, yo iré..."</p>
      
      <div style="font-size: 1.2rem; font-weight: 600; margin: 20px 0;">24 . MAYO . 2026</div>

      <div class="countdown-container" id="timer-display">
        <div class="countdown-item"><span class="countdown-number" id="d">00</span><span class="countdown-label">Días</span></div>
        <div class="countdown-item"><span class="countdown-number" id="h">00</span><span class="countdown-label">Hrs</span></div>
        <div class="countdown-item"><span class="countdown-number" id="m">00</span><span class="countdown-label">Min</span></div>
        <div class="countdown-item"><span class="countdown-number" id="s">00</span><span class="countdown-label">Seg</span></div>
      </div>
    </div>

    <div class="carousel-container">
      <div class="carousel-slide" id="slider">
        <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=500" alt="Boda 1">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500" alt="Boda 2">
        <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=500" alt="Boda 3">
      </div>
    </div>

    <h2 style="font-family: var(--fuente-nombres);">Itinerario</h2>
    <div style="margin: 30px 0;">
      <div class="timeline-item">
        <div style="flex:1; text-align:right;"><h4>Ceremonia</h4><p style="font-size:0.8rem;">10:30 AM</p></div>
        <div class="timeline-dot"></div>
        <div style="flex:1;"></div>
      </div>
      <div class="timeline-item">
        <div style="flex:1;"></div>
        <div class="timeline-dot"></div>
        <div style="flex:1; text-align:left;"><h4>Recepción</h4><p style="font-size:0.8rem;">12:00 PM</p></div>
      </div>
    </div>

    <div class="arch-card-large" style="border-radius: 20px; padding: 30px;">
      <h3 style="font-family: var(--fuente-nombres);">CONFIRMACIÓN</h3>
      <input type="text" id="nombre" placeholder="Tu nombre" style="margin-bottom:10px; padding:10px; width:80%;"><br>
      <button class="btn-wa" onclick="enviarWA()">CONFIRMAR ASISTENCIA <i class="fa-brands fa-whatsapp"></i></button>
    </div>
  </div>

  <script>
    // Mostrar secciones al hacer clic en el botón del sobre
    document.getElementById('btnDetalles').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('secciones').style.display = 'block';
      setTimeout(() => {
        document.getElementById('secciones').scrollIntoView({ behavior: 'smooth' });
      }, 100);
    });

    // Contador
    const target = new Date("2026-05-24T10:30:00").getTime();
    setInterval(() => {
      const now = new Date().getTime();
      const diff = target - now;
      document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
      document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      document.getElementById('s').innerText = Math.floor((diff % (1000 * 60)) / 1000);
    }, 1000);

    // Carrusel Automático
    let idx = 0;
    const slides = document.getElementById('slider');
    setInterval(() => {
      idx = (idx + 1) % 3;
      slides.style.transform = `translateX(-${idx * 100}%)`;
    }, 3000);

    function enviarWA() {
      const nombre = document.getElementById('nombre').value;
      if(!nombre) return alert("Escribe tu nombre");
      window.open(`https://wa.me/593900000000?text=¡Hola! Confirmo mi asistencia: ${nombre}`);
    }
  </script>
</body>
</html>
