



<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Lorenzo & Thalia</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root { --azul: #1c2a3d; --dorado: #b59a6d; --crema: #f4ece0; }
    body { margin: 0; background-color: #e2d1b9; font-family: 'Montserrat', sans-serif; color: var(--azul); overflow-x: hidden; }
    
    .hero-section { height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    .envelope-wrapper { position: relative; width: 300px; height: 200px; cursor: pointer; perspective: 1000px; }
    .envelope { position: absolute; width: 100%; height: 100%; background: var(--azul); z-index: 4; border-radius: 4px; }
    .envelope-top { position: absolute; top: 0; width: 100%; height: 100%; background: #24354a; clip-path: polygon(0 0, 100% 0, 50% 55%); z-index: 6; transition: 0.8s; transform-origin: top; }
    .tag-card { position: absolute; bottom: 5px; left: 5%; width: 90%; height: 180px; background: var(--crema); z-index: 2; transition: 0.8s; text-align: center; padding: 15px; box-sizing: border-box; }
    .envelope-wrapper.open .envelope-top { transform: rotateX(180deg); z-index: 1; }
    .envelope-wrapper.open .tag-card { transform: translateY(-150px); z-index: 8; height: 250px; }

    .content-section { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
    .arch-card { background: white; border-radius: 120px 120px 20px 20px; padding: 50px 20px; text-align: center; border: 1px solid #dcd0ba; }
    
    /* --- DISEÑO DEL CONTADOR CORREGIDO --- */
    .countdown-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
    .countdown-item { display: flex; flex-direction: column; width: 65px; align-items: center; }
    .countdown-number { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: bold; color: var(--azul); line-height: 1; }
    .countdown-label { font-size: 0.6rem; color: var(--dorado); text-transform: uppercase; margin-top: 5px; font-weight: 600; }
    
    .btn-wa { background: var(--azul); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="hero-section">
    <div class="envelope-wrapper" id="envelope" onclick="this.classList.toggle('open')">
      <div class="envelope"><div class="envelope-top"></div></div>
      <div class="tag-card">
        <h2 style="font-family: 'Playfair Display'; margin:0;">Lorenzo & Thalia</h2>
        <p style="font-size: 0.7rem; color: var(--dorado);">INVITACIÓN</p>
        <p style="font-weight: bold; margin: 10px 0;">FAM. LLAMAS LÓPEZ</p>
        <button class="btn-wa" id="btnDetalles">VER DETALLES</button>
      </div>
    </div>
    <p style="margin-top: 20px; font-size: 0.7rem; opacity: 0.6;">TOCA EL SOBRE PARA ABRIR</p>
  </div>

  <div id="secciones" class="content-section">
    <div class="arch-card">
      <h1 style="font-family: 'Playfair Display'; font-size: 2rem; margin-bottom: 5px;">Lorenzo & Thalia</h1>
      <p style="letter-spacing: 2px; font-size: 0.9rem;">24 . MAYO . 2026</p>
      
      <div class="countdown-container">
        <div class="countdown-item"><span id="days" class="countdown-number">00</span><span class="countdown-label">Días</span></div>
        <div class="countdown-item"><span id="hours" class="countdown-number">00</span><span class="countdown-label">Horas</span></div>
        <div class="countdown-item"><span id="minutes" class="countdown-number">00</span><span class="countdown-label">Min</span></div>
        <div class="countdown-item"><span id="seconds" class="countdown-number">00</span><span class="countdown-label">Seg</span></div>
      </div>
    </div>
  </div>

<script>
  // Mostrar la invitación
  const btn = document.getElementById('btnDetalles');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('secciones').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  });

  // --- LÓGICA DEL CONTADOR (REVISADA) ---
  function updateTimer() {
    const targetDate = new Date("May 24, 2026 10:30:00").getTime();
    const now = new Date().getTime();
    const gap = targetDate - now;

    if (gap <= 0) {
      document.querySelector('.countdown-container').innerHTML = "<h3>¡Llegó el día!</h3>";
      return;
    }

    // Cálculos de tiempo
    const d = Math.floor(gap / (1000 * 60 * 60 * 24));
    const h = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((gap % (1000 * 60)) / 1000);

    // Actualizar el HTML (asegurando que siempre tengan 2 dígitos)
    document.getElementById('days').innerText = d < 10 ? '0' + d : d;
    document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
    document.getElementById('minutes').innerText = m < 10 ? '0' + m : m;
    document.getElementById('seconds').innerText = s < 10 ? '0' + s : s;
  }

  // Ejecutar cada segundo
  setInterval(updateTimer, 1000);
  updateTimer(); // Llamar una vez al cargar para evitar el 00 inicial
</script>

</body>
</html>
