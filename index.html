<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorenzo & Thalia</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --azul: #1c2a3d; --dorado: #b59a6d; --crema: #f4ece0; }
    body { margin: 0; background-color: #e2d1b9; font-family: 'Montserrat', sans-serif; color: var(--azul); overflow-x: hidden; }
    
    /* SECCIÓN SOBRE */
    .hero { height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; flex-direction: column; }
    .env-wrapper { position: relative; width: 320px; height: 220px; cursor: pointer; perspective: 1000px; }
    .env-box { position: absolute; width: 100%; height: 100%; background: var(--azul); border-radius: 4px; z-index: 4; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    .env-top { position: absolute; top: 0; width: 100%; height: 100%; background: #24354a; clip-path: polygon(0 0, 100% 0, 50% 55%); z-index: 6; transition: 0.8s; transform-origin: top; }
    .seal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -25%); width: 65px; height: 65px; background: radial-gradient(circle, #d4af37, #b59a6d); border-radius: 50%; z-index: 10; display: flex; justify-content: center; align-items: center; color: white; font-family: 'Playfair Display'; font-size: 1.5rem; transition: 0.5s; }
    .card { position: absolute; bottom: 5px; left: 5%; width: 90%; height: 200px; background: var(--crema); z-index: 2; transition: 0.8s; padding: 20px; text-align: center; box-sizing: border-box; }
    
    .env-wrapper.open .env-top { transform: rotateX(180deg); z-index: 1; }
    .env-wrapper.open .card { transform: translateY(-160px); z-index: 8; height: 260px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .env-wrapper.open .seal { opacity: 0; }

    /* CONTENIDO */
    .main-content { display: none; padding: 40px 15px; max-width: 500px; margin: 0 auto; text-align: center; }
    .arch { background: white; border-radius: 120px 120px 20px 20px; padding: 50px 20px; border: 1px solid #dcd0ba; margin-bottom: 30px; }
    
    /* CARRUSEL */
    .slider-box { position: relative; overflow: hidden; border-radius: 100px 100px 20px 20px; border: 5px solid white; margin: 20px 0; }
    .slides { display: flex; transition: 0.6s ease-in-out; }
    .slides img { width: 100%; aspect-ratio: 3/4; object-fit: cover; flex-shrink: 0; }
    
    .btn-wa { background: var(--azul); color: white; border: none; padding: 15px 25px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: 600; text-decoration: none; display: block; margin-top: 10px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="env-wrapper" id="env" onclick="this.classList.toggle('open')">
      <div class="env-box">
        <div class="env-top"></div>
        <div class="seal">L&T</div>
      </div>
      <div class="card">
        <h3 style="font-family: 'Playfair Display'; margin: 0;">Lorenzo & Thalia</h3>
        <p style="font-size: 0.7rem; color: var(--dorado); letter-spacing: 2px;">INVITACIÓN</p>
        <p style="font-weight: 600; margin-top: 15px;">FAM. LLAMAS LÓPEZ</p>
        <p style="font-size: 0.8rem; color: #777;">Pases: 5</p>
        <button class="btn-wa" id="verMas" style="padding: 8px; font-size: 0.7rem;">VER DETALLES</button>
      </div>
    </div>
    <p style="margin-top: 20px; font-size: 0.7rem; letter-spacing: 1px;">TOCA EL SOBRE PARA ABRIR</p>
  </div>

  <div class="main-content" id="content">
    <div class="arch">
      <h1 style="font-family: 'Playfair Display';">Lorenzo & Thalia</h1>
      <p>24 DE MAYO, 2026</p>
      <div id="timer" style="font-weight: 600; font-size: 1.2rem; color: var(--dorado);"></div>
    </div>

    <div class="slider-box">
      <div class="slides" id="slider">
        <img src="img/foto1.webp" onerror="this.src='foto1.webp'">
        <img src="img/foto2.jpeg" onerror="this.src='foto2.jpeg'">
        <img src="img/foto3.jpeg" onerror="this.src='foto3.jpeg'">
      </div>
    </div>

    <div class="arch" style="border-radius: 20px;">
      <h3>CONFIRMAR ASISTENCIA</h3>
      <input type="text" id="nom" placeholder="Tu nombre completo">
      <select id="est">
        <option value="Confirmado">✓ Sí, asistiré</option>
        <option value="No asistirá">X No podré ir</option>
      </select>
      <button class="btn-wa" onclick="enviar()">ENVIAR A WHATSAPP</button>
    </div>
  </div>

<script>
  // Mostrar contenido
  document.getElementById('verMas').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('content').style.display = 'block';
    document.getElementById('content').scrollIntoView({ behavior: 'smooth' });
  });

  // Carrusel
  let idx = 0;
  setInterval(() => {
    const s = document.getElementById('slider');
    idx = (idx + 1) % 3;
    s.style.transform = `translateX(-${idx * 100}%)`;
  }, 4000);

  // WhatsApp
  function enviar() {
    const cel = "593987654321"; // <--- PON TU NÚMERO AQUÍ (sin el +)
    const n = document.getElementById('nom').value;
    const e = document.getElementById('est').value;
    if(!n) return alert("Escribe tu nombre");
    window.open(`https://wa.me/${cel}?text=Hola! Confirmo asistencia.%0ANombre: ${n}%0AEstado: ${e}`);
  }

  // Contador
  const fin = new Date("2026-05-24T10:30:00").getTime();
  setInterval(() => {
    const ahora = new Date().getTime();
    const d = fin - ahora;
    const dias = Math.floor(d / (1000 * 60 * 60 * 24));
    document.getElementById("timer").innerText = `Faltan ${dias} días`;
  }, 1000);
</script>
</body>
</html>
